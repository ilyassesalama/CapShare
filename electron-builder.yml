appId: co.lysi.capshare
productName: CapShare
directories:
  buildResources: build
# Publish installers to GitHub Releases (used by `electron-builder --publish`).
publish:
  - provider: github
    owner: ilyassesalama
    repo: CapShare
# Uniform ad-hoc re-sign of the universal bundle (see build/mac-after-pack.cjs).
afterPack: build/mac-after-pack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**

# Double-clicking a .capshare file opens it in CapShare.
# macOS: written into CFBundleDocumentTypes; Windows: registered by the NSIS installer
# (the portable build cannot persist registry associations).
fileAssociations:
  - ext: capshare
    name: CapShare Project
    description: Portable CapCut project bundle
    mimeType: application/x-capshare
    role: Editor
    rank: Owner

win:
  executableName: CapShare
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
portable:
  artifactName: ${name}-${version}-portable.${ext}

mac:
  # Real signing path: when a Developer ID cert is available (auto-discovery on,
  # or CSC_LINK/CSC_KEY_PASSWORD set in CI), electron-builder signs the merged
  # universal bundle with hardened runtime and notarizes it via the App Store
  # Connect API key (APPLE_API_KEY/_KEY_ID/_ISSUER env vars).
  #
  # Fallback path: set CSC_IDENTITY_AUTO_DISCOVERY=false (CI smoke test, or a
  # contributor without the cert) and electron-builder skips signing — then
  # build/mac-after-pack.cjs ad-hoc deep-signs the universal bundle so it still
  # launches on Apple Silicon (recipients right-click → Open on first launch).
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarize only when API-key env vars are present (release CI); skipped for
  # --dir and unsigned builds. Team ID (CUFPZ34729) comes from the Developer ID cert.
  notarize: true
  category: public.app-category.video
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    UTExportedTypeDeclarations:
      - UTTypeIdentifier: co.lysi.capshare.project
        UTTypeDescription: CapShare Project
        UTTypeConformsTo:
          - public.data
          - public.archive
        UTTypeTagSpecification:
          public.filename-extension:
            - capshare
          public.mime-type:
            - application/x-capshare
dmg:
  artifactName: ${name}-${version}.${ext}

npmRebuild: false
