name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to publish (e.g. v0.1.0). Builds a draft release.'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish (macOS)
        if: runner.os == 'macOS'
        run: pnpm run build && pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer cert: ad-hoc signing is done in build/mac-after-pack.cjs.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build & publish (Windows)
        if: runner.os == 'Windows'
        run: pnpm run build && pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
