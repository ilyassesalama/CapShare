name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to publish (e.g. v1.0.0). Publishes a GitHub release.'
        required: true

permissions:
  contents: write

jobs:
  # Runs once before the build matrix: guards against a tag/version mismatch
  # (electron-builder publishes to a release named after package.json's version,
  # not the git tag) and pre-creates the published release so the parallel
  # macOS/Windows jobs upload into one release instead of racing to create
  # duplicates. Release type must match electron-builder's releaseType: release.
  prepare:
    name: Verify & ensure release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag matches package.json version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $VERSION. Bump the version in package.json and re-tag."
            exit 1
          fi

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes

  release:
    name: Build & publish (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        # On tag push `inputs.tag` is empty, so checkout uses the pushed tag;
        # on manual dispatch it checks out the requested tag/version.
        with:
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish (macOS)
        if: runner.os == 'macOS'
        run: pnpm run build && pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID Application cert (.p12, base64) + its password.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build & publish (Windows)
        if: runner.os == 'Windows'
        run: pnpm run build && pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
