name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, typecheck & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Skip the Electron binary download — unit tests run on plain Node.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

  package:
    name: Package smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main
        run: pnpm exec electron-vite build

      - name: Package (unpacked smoke test)
        run: pnpm exec electron-builder --dir ${{ runner.os == 'macOS' && '--mac' || '--win' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
